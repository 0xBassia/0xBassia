<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="Mohamed Bassia">
  <title>Mohamed Bassia</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>

    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6e5cf0" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#6e5cf0" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8">
        <animate attributeName="stop-color"
          values="#38bdf8;#818cf8;#c084fc;#38bdf8" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#818cf8">
        <animate attributeName="stop-color"
          values="#818cf8;#c084fc;#38bdf8;#818cf8" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#c084fc">
        <animate attributeName="stop-color"
          values="#c084fc;#38bdf8;#818cf8;#c084fc" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="24" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1197" height="317" rx="22.5" fill="none"
        stroke="#30363d" stroke-width="1.5"/>

  <ellipse cx="600" cy="150" rx="540" ry="150" fill="url(#halo)">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <g text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="600" y="172" font-size="96" font-weight="800" letter-spacing="1.5"
          fill="url(#name)" filter="url(#glow)">
      Mohamed Bassia
    </text>

    <line x1="468" y1="208" x2="732" y2="208" stroke="url(#name)"
          stroke-width="3" stroke-linecap="round">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="6s" repeatCount="indefinite"/>
    </line>

    <text x="600" y="258" font-size="27" font-weight="500" letter-spacing="11"
          fill="#8b949e"
          font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace">
      @0xBassia
    </text>
  </g>
</svg>
