<svg width="850" height="240" viewBox="0 0 850 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="850" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.5" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="850" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00ff9c"/>
      <stop offset="0.5" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#bd00ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: 'Courier New', Courier, monospace; }
      .cursor { animation: blink 1s step-end infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .scan { animation: scan 6s linear infinite; }
      @keyframes scan { 0% { transform: translateY(-20px); } 100% { transform: translateY(260px); } }
      .glitch1 { animation: g1 4s infinite; }
      .glitch2 { animation: g2 4s infinite; }
      @keyframes g1 { 0%,93%,100% { transform: translate(0,0); opacity:0; } 94% { transform: translate(-3px,1px); opacity:.7; } 96% { transform: translate(2px,-1px); opacity:.5; } 98% { transform: translate(0,0); opacity:0; } }
      @keyframes g2 { 0%,93%,100% { transform: translate(0,0); opacity:0; } 94% { transform: translate(3px,-1px); opacity:.6; } 96% { transform: translate(-2px,1px); opacity:.4; } 98% { transform: translate(0,0); opacity:0; } }
      .fadein { animation: fade 1.2s ease-out both; }
      @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
      .typeline { animation: fade 1s ease-out .6s both; }
      .pulse { animation: pulse 3s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity:.25; } 50% { opacity:.6; } }
      .drift { animation: drift 14s linear infinite; }
      @keyframes drift { from { transform: translateX(0); } to { transform: translateX(-425px); } }
    </style>
  </defs>

  <!-- background -->
  <rect width="850" height="240" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="849" height="239" rx="11.5" stroke="#1f2a3a"/>

  <!-- hex grid drift -->
  <g class="drift" opacity="0.07" fill="none" stroke="#00ff9c" stroke-width="1">
    <g class="mono" font-size="11" fill="#00ff9c" stroke="none">
      <text x="20" y="30">0x4d</text><text x="120" y="60">0x42</text><text x="240" y="35">7f 45 4c 46</text>
      <text x="380" y="55">0xdeadbeef</text><text x="540" y="30">73 73 68</text><text x="680" y="50">0x90 0x90</text>
      <text x="60" y="210">sudo -l</text><text x="220" y="225">nmap -sV</text><text x="400" y="215">::1</text>
      <text x="520" y="228">CVE-····-····</text><text x="700" y="218">/etc/shadow</text>
      <text x="445" y="30">0x4d</text><text x="545" y="60">0x42</text><text x="665" y="35">7f 45 4c 46</text>
      <text x="805" y="55">0xdeadbeef</text><text x="485" y="210">sudo -l</text><text x="645" y="225">nmap -sV</text>
    </g>
  </g>

  <!-- terminal window -->
  <g class="fadein">
    <rect x="40" y="36" width="770" height="168" rx="10" fill="#0b0f14" stroke="#22304a"/>
    <rect x="40" y="36" width="770" height="30" rx="10" fill="#121a26"/>
    <rect x="40" y="56" width="770" height="10" fill="#121a26"/>
    <circle cx="62" cy="51" r="5" fill="#ff5f56"/>
    <circle cx="80" cy="51" r="5" fill="#ffbd2e"/>
    <circle cx="98" cy="51" r="5" fill="#27c93f"/>
    <text x="425" y="55" text-anchor="middle" class="mono" font-size="12" fill="#5b6b82">root@0xbassia: ~</text>
  </g>

  <!-- prompt line -->
  <g class="typeline">
    <text x="64" y="96" class="mono" font-size="14" fill="#00ff9c">┌──(<tspan fill="#00d4ff">root</tspan><tspan fill="#5b6b82">㉿</tspan><tspan fill="#00d4ff">0xbassia</tspan>)-[<tspan fill="#e6edf3">~/redteam</tspan>]</text>
    <text x="64" y="116" class="mono" font-size="14" fill="#00ff9c">└─# <tspan fill="#e6edf3">whoami --verbose</tspan></text>
  </g>

  <!-- name with glitch layers -->
  <text x="64" y="158" class="mono glitch1" font-size="34" font-weight="bold" fill="#ff2d78">Mohamed Bassia</text>
  <text x="64" y="158" class="mono glitch2" font-size="34" font-weight="bold" fill="#00d4ff">Mohamed Bassia</text>
  <text x="64" y="158" class="mono" font-size="34" font-weight="bold" fill="url(#neon)" filter="url(#glow)">Mohamed Bassia</text>

  <!-- role line -->
  <text x="64" y="186" class="mono typeline" font-size="15" fill="#8b9cb3">&gt; Security Researcher <tspan fill="#00ff9c">::</tspan> Red Teamer <tspan fill="#00ff9c">::</tspan> Offensive Security<tspan class="cursor" fill="#00ff9c">█</tspan></text>

  <!-- scanline -->
  <rect x="40" y="0" width="770" height="3" fill="#00ff9c" opacity="0.12" class="scan"/>

  <!-- corner accents -->
  <g class="pulse" stroke="url(#neon)" stroke-width="2" fill="none">
    <path d="M14 30 V14 H30"/>
    <path d="M820 14 H836 V30"/>
    <path d="M836 210 V226 H820"/>
    <path d="M30 226 H14 V210"/>
  </g>
</svg>
